<!doctype html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Teste Setores e Cargos</title>
    <style>
        :root {
            color-scheme: light;
            --bg: #f6f7f9;
            --panel: #ffffff;
            --line: #d9dee7;
            --text: #1f2937;
            --muted: #667085;
            --primary: #0f766e;
            --danger: #b42318;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            background: var(--bg);
            color: var(--text);
            font-family: Arial, sans-serif;
            font-size: 14px;
        }

        main {
            width: min(1120px, calc(100vw - 32px));
            margin: 24px auto;
        }

        h1,
        h2 {
            margin: 0 0 12px;
            line-height: 1.2;
        }

        h1 {
            font-size: 24px;
        }

        h2 {
            font-size: 18px;
        }

        section {
            margin-top: 16px;
            padding: 16px;
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: 8px;
        }

        .forms,
        .tables {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 16px;
        }

        form {
            display: grid;
            gap: 10px;
        }

        label {
            display: grid;
            gap: 4px;
            color: var(--muted);
            font-size: 12px;
        }

        input,
        select,
        textarea {
            width: 100%;
            min-height: 38px;
            padding: 8px 10px;
            border: 1px solid var(--line);
            border-radius: 6px;
            color: var(--text);
            background: #fff;
            font: inherit;
        }

        textarea {
            min-height: 88px;
            resize: vertical;
        }

        .actions {
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
        }

        button {
            min-height: 36px;
            padding: 8px 12px;
            border: 1px solid var(--line);
            border-radius: 6px;
            color: var(--text);
            background: #fff;
            cursor: pointer;
            font: inherit;
        }

        button.primary {
            border-color: var(--primary);
            background: var(--primary);
            color: #fff;
        }

        button.danger {
            border-color: var(--danger);
            color: var(--danger);
        }

        .status {
            min-height: 24px;
            margin-top: 12px;
            color: var(--muted);
        }

        .table-wrap {
            overflow-x: auto;
        }

        table {
            width: 100%;
            min-width: 520px;
            border-collapse: collapse;
        }

        th,
        td {
            padding: 10px;
            border-bottom: 1px solid var(--line);
            text-align: left;
            vertical-align: top;
        }

        th {
            color: var(--muted);
            font-size: 12px;
            font-weight: 700;
        }

        td.actions-cell {
            white-space: nowrap;
        }

        @media (max-width: 820px) {
            .forms,
            .tables {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
<main>
    <h1>Teste Setores e Cargos</h1>
    <div id="status" class="status"></div>

    <section class="forms">
        <div>
            <h2>Setor</h2>
            <form id="sector-form">
                <input id="sector_id" type="hidden">
                <label>
                    Nome
                    <input id="sector_name" maxlength="100" required>
                </label>
                <label>
                    Descricao
                    <textarea id="sector_description"></textarea>
                </label>
                <div class="actions">
                    <button id="sector-submit" class="primary" type="submit">Salvar setor</button>
                    <button type="button" onclick="resetSectorForm()">Limpar</button>
                </div>
            </form>
        </div>

        <div>
            <h2>Cargo</h2>
            <form id="role-form">
                <input id="role_id" type="hidden">
                <label>
                    Nome
                    <input id="role_name" maxlength="100" required>
                </label>
                <label>
                    Setor
                    <select id="role_sector" required></select>
                </label>
                <label>
                    Descricao
                    <textarea id="role_description"></textarea>
                </label>
                <div class="actions">
                    <button id="role-submit" class="primary" type="submit">Salvar cargo</button>
                    <button type="button" onclick="resetRoleForm()">Limpar</button>
                </div>
            </form>
        </div>
    </section>

    <section class="tables">
        <div>
            <h2>Setores</h2>
            <div class="table-wrap">
                <table>
                    <thead>
                    <tr>
                        <th>ID</th>
                        <th>Nome</th>
                        <th>Setor</th>
                        <th>Descricao</th>
                        <th>Acoes</th>
                    </tr>
                    </thead>
                    <tbody id="sectors-body"></tbody>
                </table>
            </div>
        </div>

        <div>
            <h2>Cargos</h2>
            <div class="table-wrap">
                <table>
                    <thead>
                    <tr>
                        <th>ID</th>
                        <th>Nome</th>
                        <th>Descricao</th>
                        <th>Acoes</th>
                    </tr>
                    </thead>
                    <tbody id="roles-body"></tbody>
                </table>
            </div>
        </div>
    </section>
</main>

<script>
const apiBase = '/api/setor/teste/api';
let sectors = [];
let roles = [];

function getCookie(name) {
    const value = `; ${document.cookie}`;
    const parts = value.split(`; ${name}=`);
    if (parts.length === 2) {
        return parts.pop().split(';').shift();
    }
    return '';
}

function setStatus(text) {
    document.querySelector('#status').textContent = text || '';
}

function cell(row, value) {
    const td = document.createElement('td');
    td.textContent = value ?? '';
    row.appendChild(td);
    return td;
}

function button(label, onClick, className) {
    const element = document.createElement('button');
    element.type = 'button';
    element.textContent = label;
    if (className) {
        element.className = className;
    }
    element.addEventListener('click', onClick);
    return element;
}

function emptyRow(body, colspan, text) {
    const row = document.createElement('tr');
    const td = document.createElement('td');
    td.colSpan = colspan;
    td.textContent = text;
    row.appendChild(td);
    body.appendChild(row);
}

async function requestJson(url, options = {}) {
    const response = await fetch(url, {
        headers: {
            'Content-Type': 'application/json',
            'X-CSRFToken': getCookie('csrftoken'),
            ...(options.headers || {}),
        },
        ...options,
    });

    const text = await response.text();
    const data = text ? JSON.parse(text) : {};
    if (!response.ok) {
        throw new Error(JSON.stringify(data));
    }
    return data;
}

function sectorPayload() {
    return {
        nome: document.querySelector('#sector_name').value,
        descricao: document.querySelector('#sector_description').value,
    };
}

function rolePayload() {
    return {
        nome: document.querySelector('#role_name').value,
        fk_id_setor: document.querySelector('#role_sector').value,
        descricao: document.querySelector('#role_description').value,
    };
}

function resetSectorForm() {
    document.querySelector('#sector-form').reset();
    document.querySelector('#sector_id').value = '';
    document.querySelector('#sector-submit').textContent = 'Salvar setor';
}

function resetRoleForm() {
    document.querySelector('#role-form').reset();
    document.querySelector('#role_id').value = '';
    document.querySelector('#role-submit').textContent = 'Salvar cargo';
}

function editSector(sector) {
    document.querySelector('#sector_id').value = sector.id_setor;
    document.querySelector('#sector_name').value = sector.nome || '';
    document.querySelector('#sector_description').value = sector.descricao || '';
    document.querySelector('#sector-submit').textContent = 'Atualizar setor';
}

function editRole(role) {
    document.querySelector('#role_id').value = role.id_cargo;
    document.querySelector('#role_name').value = role.nome || '';
    document.querySelector('#role_sector').value = role.fk_id_setor || '';
    document.querySelector('#role_description').value = role.descricao || '';
    document.querySelector('#role-submit').textContent = 'Atualizar cargo';
}

function fillRoleSectorOptions() {
    const select = document.querySelector('#role_sector');
    const currentValue = select.value;
    select.textContent = '';

    const empty = document.createElement('option');
    empty.value = '';
    empty.textContent = 'Selecione';
    select.appendChild(empty);

    sectors.forEach((sector) => {
        const option = document.createElement('option');
        option.value = sector.id_setor;
        option.textContent = sector.nome;
        select.appendChild(option);
    });

    select.value = currentValue;
}

function renderSectors() {
    const body = document.querySelector('#sectors-body');
    body.textContent = '';
    if (!sectors.length) {
        emptyRow(body, 4, 'Nenhum setor encontrado.');
        fillRoleSectorOptions();
        return;
    }

    sectors.forEach((sector) => {
        const row = document.createElement('tr');
        cell(row, sector.id_setor);
        cell(row, sector.nome);
        cell(row, sector.descricao);

        const actions = cell(row, '');
        actions.className = 'actions-cell';
        actions.appendChild(button('Editar', () => editSector(sector)));
        actions.appendChild(button('Deletar', () => deleteSector(sector.id_setor), 'danger'));
        body.appendChild(row);
    });

    fillRoleSectorOptions();
}

function renderRoles() {
    const body = document.querySelector('#roles-body');
    body.textContent = '';
    if (!roles.length) {
        emptyRow(body, 5, 'Nenhum cargo encontrado.');
        return;
    }

    roles.forEach((role) => {
        const row = document.createElement('tr');
        cell(row, role.id_cargo);
        cell(row, role.nome);
        cell(row, role.setor_nome || role.fk_id_setor);
        cell(row, role.descricao);

        const actions = cell(row, '');
        actions.className = 'actions-cell';
        actions.appendChild(button('Editar', () => editRole(role)));
        actions.appendChild(button('Deletar', () => deleteRole(role.id_cargo), 'danger'));
        body.appendChild(row);
    });
}

async function loadData() {
    setStatus('Carregando...');
    const sectorData = await requestJson(apiBase + '/setores/');
    const roleData = await requestJson(apiBase + '/cargos/');
    sectors = sectorData.results || [];
    roles = roleData.results || [];
    renderSectors();
    renderRoles();
    setStatus('');
}

async function saveSector(event) {
    event.preventDefault();
    const id = document.querySelector('#sector_id').value;
    const url = id ? `${apiBase}/setores/${id}/` : `${apiBase}/setores/`;
    const method = id ? 'PUT' : 'POST';
    await requestJson(url, {
        method,
        body: JSON.stringify(sectorPayload()),
    });
    resetSectorForm();
    await loadData();
    setStatus('Setor salvo.');
}

async function saveRole(event) {
    event.preventDefault();
    const id = document.querySelector('#role_id').value;
    const url = id ? `${apiBase}/cargos/${id}/` : `${apiBase}/cargos/`;
    const method = id ? 'PUT' : 'POST';
    await requestJson(url, {
        method,
        body: JSON.stringify(rolePayload()),
    });
    resetRoleForm();
    await loadData();
    setStatus('Cargo salvo.');
}

async function deleteSector(id) {
    if (!window.confirm('Deletar setor?')) {
        return;
    }
    await requestJson(`${apiBase}/setores/${id}/`, { method: 'DELETE' });
    await loadData();
    setStatus('Setor deletado.');
}

async function deleteRole(id) {
    if (!window.confirm('Deletar cargo?')) {
        return;
    }
    await requestJson(`${apiBase}/cargos/${id}/`, { method: 'DELETE' });
    await loadData();
    setStatus('Cargo deletado.');
}

document.querySelector('#sector-form').addEventListener('submit', (event) => {
    saveSector(event).catch((error) => setStatus(error.message));
});

document.querySelector('#role-form').addEventListener('submit', (event) => {
    saveRole(event).catch((error) => setStatus(error.message));
});

loadData().catch((error) => setStatus(error.message));
</script>
</body>
</html>
