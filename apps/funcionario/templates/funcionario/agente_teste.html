<!doctype html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Teste do agente interno</title>
    <style>
        :root {
            color-scheme: light;
            font-family: Arial, sans-serif;
        }

        body {
            margin: 0;
            background: #f6f7f9;
            color: #111827;
        }

        main {
            max-width: 980px;
            margin: 0 auto;
            padding: 24px;
        }

        h1 {
            margin: 0 0 20px;
            font-size: 24px;
        }

        section {
            margin-bottom: 22px;
            padding: 18px;
            background: #ffffff;
            border: 1px solid #d7dce3;
            border-radius: 8px;
        }

        h2 {
            margin: 0 0 14px;
            font-size: 18px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-weight: 700;
            font-size: 14px;
        }

        input,
        textarea,
        pre {
            width: 100%;
            box-sizing: border-box;
            border: 1px solid #b8c0cc;
            border-radius: 6px;
            padding: 10px;
            font: inherit;
            background: #ffffff;
        }

        textarea {
            min-height: 96px;
            resize: vertical;
        }

        pre {
            min-height: 120px;
            white-space: pre-wrap;
            word-break: break-word;
            background: #f9fafb;
        }

        .row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
        }

        .field {
            margin-bottom: 14px;
        }

        button {
            border: 0;
            border-radius: 6px;
            padding: 10px 14px;
            background: #2563eb;
            color: #ffffff;
            font-weight: 700;
            cursor: pointer;
        }

        button.secondary {
            background: #4b5563;
        }

        button:disabled {
            opacity: 0.65;
            cursor: wait;
        }

        .actions {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .status {
            font-size: 14px;
            color: #374151;
        }

        @media (max-width: 720px) {
            main {
                padding: 16px;
            }

            .row {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
<main>
    <h1>Teste do agente interno</h1>

    <section>
        <h2>Perguntar ao agente</h2>
        <form id="pergunta-form">
            <div class="field">
                <label for="pergunta">Pergunta</label>
                <textarea id="pergunta" name="pergunta" required minlength="5"></textarea>
            </div>
            <div class="actions">
                <button type="submit">Enviar pergunta</button>
                <button class="secondary" type="button" id="limpar-resposta">Limpar</button>
                <span class="status" id="pergunta-status"></span>
            </div>
        </form>
        <div class="field" style="margin-top: 16px;">
            <label for="resposta">Resposta do agente</label>
            <pre id="resposta"></pre>
        </div>
    </section>

    <section>
        <h2>Upload de documento</h2>
        <form id="upload-form">
            <div class="row">
                <div class="field">
                    <label for="titulo">Titulo</label>
                    <input id="titulo" name="titulo" type="text" maxlength="150" placeholder="Politica interna">
                </div>
                <div class="field">
                    <label for="arquivo">Arquivo</label>
                    <input id="arquivo" name="arquivo" type="file" accept=".pdf,.doc,.docx" required>
                </div>
            </div>
            <div class="actions">
                <button type="submit">Enviar documento</button>
                <button class="secondary" type="reset">Limpar</button>
                <span class="status" id="upload-status"></span>
            </div>
        </form>
        <div class="field" style="margin-top: 16px;">
            <label for="upload-output">Resultado do upload</label>
            <pre id="upload-output"></pre>
        </div>
    </section>
</main>

<script>
    function getCookie(name) {
        const cookies = document.cookie ? document.cookie.split(';') : [];
        for (const cookie of cookies) {
            const [key, ...value] = cookie.trim().split('=');
            if (key === name) {
                return decodeURIComponent(value.join('='));
            }
        }
        return '';
    }

    async function parseResponse(response) {
        const data = await response.json().catch(() => ({ detail: 'Resposta invalida do servidor.' }));
        if (!response.ok) {
            throw data;
        }
        return data;
    }

    function showJson(element, data) {
        element.textContent = JSON.stringify(data, null, 2);
    }

    const perguntaForm = document.getElementById('pergunta-form');
    const perguntaStatus = document.getElementById('pergunta-status');
    const respostaOutput = document.getElementById('resposta');
    const uploadForm = document.getElementById('upload-form');
    const uploadStatus = document.getElementById('upload-status');
    const uploadOutput = document.getElementById('upload-output');

    perguntaForm.addEventListener('submit', async (event) => {
        event.preventDefault();
        const button = perguntaForm.querySelector('button[type="submit"]');
        button.disabled = true;
        perguntaStatus.textContent = 'Enviando...';
        respostaOutput.textContent = '';

        try {
            const response = await fetch('/api/funcionario/teste/api/agente/perguntar/', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': getCookie('csrftoken'),
                },
                body: JSON.stringify({
                    pergunta: document.getElementById('pergunta').value,
                }),
            });
            const data = await parseResponse(response);
            showJson(respostaOutput, data);
            perguntaStatus.textContent = 'Resposta recebida.';
        } catch (error) {
            showJson(respostaOutput, error);
            perguntaStatus.textContent = 'Erro.';
        } finally {
            button.disabled = false;
        }
    });

    uploadForm.addEventListener('submit', async (event) => {
        event.preventDefault();
        const button = uploadForm.querySelector('button[type="submit"]');
        button.disabled = true;
        uploadStatus.textContent = 'Enviando...';
        uploadOutput.textContent = '';

        try {
            const formData = new FormData(uploadForm);
            const response = await fetch('/api/funcionario/teste/api/agente/upload/', {
                method: 'POST',
                headers: {
                    'X-CSRFToken': getCookie('csrftoken'),
                },
                body: formData,
            });
            const data = await parseResponse(response);
            showJson(uploadOutput, data);
            uploadStatus.textContent = 'Documento enviado.';
        } catch (error) {
            showJson(uploadOutput, error);
            uploadStatus.textContent = 'Erro.';
        } finally {
            button.disabled = false;
        }
    });

    document.getElementById('limpar-resposta').addEventListener('click', () => {
        respostaOutput.textContent = '';
        perguntaStatus.textContent = '';
    });
</script>
</body>
</html>
